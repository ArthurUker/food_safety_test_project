<div class="slide">
<div class="kicker">十、推广话术边界</div>
<div class="slide-title sm">哪些可以说，哪些坚决不能说</div>
<div class="g2" style="flex:1">
<div class="card">
<h3 class="ok">✓ 可以说</h3>
<ul>
<li>食品安全风险快速筛查</li>
<li>食源性病原体核酸快速检测</li>
<li>适用于日常监管、专项整治、活动保障</li>
<li>检出结果提示污染风险，建议实验室复核</li>
<li>支持记录、报告和追溯</li>
<li>可作为食品快检体系中微生物风险筛查补充</li>
</ul>
</div>
<div class="card">
<h3 class="bad">✗ 不建议说</h3>
<ul>
<li>替代实验室检测</li>
<li>可直接作为行政处罚依据</li>
<li>检出即判定食品不合格</li>
<li>100%准确</li>
<li>检出病毒即代表有感染性</li>
<li>未检出即代表食品绝对安全</li>
</ul>
</div>
</div>
<div class="note">公示建议：使用"检出/未检出/建议复核"，避免"合格/不合格/安全/违法"等绝对化表述。</div>
